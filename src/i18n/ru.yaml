start: |
  📚 Добро пожаловать в библиотеку Calibre!
  
  Вы можете искать книги по:
  - Названию (/title <название>)
  - Автору (/author <автор>)
  - Серии (/series <серия>)
  - Любому ключевому слову (/search <запрос>) или просто <запрос>
  
  Также доступны команды для:
  - /random - покажет {RANDOM_BOOKS_COUNT} случайных книг из библиотеки
  - Поиску книги по ID (/id <идентификатор>) - идентификатор можно найти в сообщении о книге
  - Загрузить книгу на сервер (/upload) - отправьте файл книги или укажите URL
  - Статистика библиотеки (/stats) - покажет количество книг, авторов и т.д.
  - /language - сменить язык интерфейса
  
  Команды для администраторов:
  - Добавить пользователя в авторизованные (/add <user_id>) - для управления доступом
  - Исправить права папки (/fix)
  
  Для получения справки по командам используйте команду /help
  
  📖 Библиотека содержит множество книг в разных форматах (EPUB, FB2, MOBI и т.д.).
  Вы можете скачивать книги в удобном для вас формате.
  
  Если у вас есть вопросы или предложения, обратитесь к администратору.
  
  Для начала поиска книг используйте команду /search или просто введите запрос.
  
  Пример: /search Гарри Поттер
  
  Также вы можете просто ввести текстовый запрос без команды, и бот попытается найти книги по этому запросу.
  
  Доступны сложные поиски например:
  - title:Гарри Поттер - поиск по названию
  - title:=Гарри Поттер - поиск по точному названию
  - author:Джоан Роулинг - поиск по автору
  - author:=Джоан Роулинг - поиск по точному автору
  - series:Гарри Поттер - поиск по серии
  - series:=Гарри Поттер - поиск по точной серии
  - tags:фэнтези - поиск по тегам
  - tags:=фэнтези - поиск по точным тегам
  - publisher:Bloomsbury - поиск по издателю
  - publisher:=Bloomsbury - поиск по точному издателю
  - languages:русский - поиск по языкам
  - languages:=русский - поиск по точному языку
  - formats:fb2 - поиск по формату
  - formats:=fb2 - поиск по точному формату
  
  А также доступны различные сочетания команд:
  - title:Гарри Поттер and author:Джоан Роулинг - поиск по названию и автору
